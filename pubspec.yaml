name: instructor_attendance_monitoring_system
description: A new Flutter project.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  # ── Existing ─────────────────────────────────────────────
  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
  image_picker_for_web: ^3.0.1
  # ── NEW: Hybrid Database ──────────────────────────────────
  sqflite: ^2.3.3+1          # Local SQLite (offline)
  path: ^1.9.0               # Required by sqflite
  supabase_flutter: ^2.5.6   # Supabase cloud sync
  connectivity_plus: ^6.0.3  # Detect online/offline state

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/tcgc.png
    - assets/images/background.jpg

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/tcgc.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/tcgc.png"
  adaptive_icon_foreground_inset: 35